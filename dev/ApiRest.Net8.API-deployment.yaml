apiVersion: apps/v1
kind: Deployment
metadata:
  name: ApiRest.Net8.API
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ApiRest.Net8.API
  template:
    metadata:
      labels:
        app: ApiRest.Net8.API
    spec:
      containers:
      - name: ApiRest.Net8.API
        image: <DOCKER_USERNAME>/ApiRest.Net8.API:development
        ports:
          - containerPort: 80
        env:
          - name: ConnectionStrings__DefaultConnection
            value: server=mysql;port=3306;database=$(DB_DATABASE);user=$(DB_USER);password=$(DB_PASSWORD)