apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
          - name: DB_DATABASE
            valueFrom:
              secretKeyRef:
                name: mysql-credentials
                key: database
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-credentials
                key: password
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mysql-credentials
                key: user
        ports:
          - containerPort: 3306